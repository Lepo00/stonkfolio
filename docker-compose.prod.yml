services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes: []
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DJANGO_DEBUG=False

  frontend:
    command: node server.js
    volumes: []
    ports:
      - "127.0.0.1:3000:3000"
